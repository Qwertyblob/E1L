# AI log-monitor — DIAGNOSER. Woken by the VPS detector (scripts/log-monitor.sh) via a
# `repository_dispatch` event of type `prod-error`. Checks out the EXACT deployed commit, then
# runs Claude Code on the bundled prod error context to either open a PR (code fix) or an issue
# (config/infra fix). The user reviews → merge → the existing CD (deploy.yml) ships it.
name: AI Log Monitor

on:
  repository_dispatch:
    types: [prod-error]

# One diagnosis at a time.
concurrency:
  group: log-monitor
  cancel-in-progress: false

jobs:
  diagnose:
    runs-on: ubuntu-latest
    permissions:
      contents: write          # create a branch + commit a fix
      pull-requests: write      # open the PR
      issues: write             # or open an issue for config/infra fixes
      id-token: write          # needed for Gemini actions
    steps:
      - name: Check out the DEPLOYED commit
        uses: actions/checkout@v4
        with:
          # The detector bundles the running image's SHA so Claude reads the source that
          # actually produced the error, not whatever is newest on main.
          ref: ${{ github.event.client_payload.commit }}
          fetch-depth: 0        # full history so Claude can branch/PR cleanly

      - name: Write the error context to a file (avoids prompt-injection into YAML)
        env:
          CONTEXT_JSON: ${{ toJSON(github.event.client_payload) }}
        run: printf '%s' "$CONTEXT_JSON" > "$RUNNER_TEMP/prod-error.json"

      - name: Diagnose with Gemini
        uses: google-github-actions/run-gemini-cli@v0
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GEMINI_YOLO_MODE: "true"
          GEMINI_CLI_TRUST_WORKSPACE: "true"
        with:
          gemini_api_key: ${{ secrets.GEMINI_API_KEY }}
          # claude_args: |
          #  --model claude-sonnet-4-6
          #  --max-turns 30
          #  --allowedTools "Bash,Read,Edit,Write,Grep,Glob"
          gemini_model: "gemini-3.1-flash-lite"
          prompt: |
            A production error was detected on the live site (https://every1luvs.com). The
            machine-readable context is in the file at $RUNNER_TEMP/prod-error.json — read it
            first. It contains: the deployed commit SHA (already checked out as the current
            working tree), the primary service (app=Spring Boot backend, web=nginx/React,
            db=Postgres), error signature hashes, and a bounded log excerpt.

            Do this, in order:
            1. Read $RUNNER_TEMP/prod-error.json and study the log excerpt.
            2. IDEMPOTENCY CHECK — before doing anything else, run:
                 gh pr list --state open --search "log-monitor in:title"
                 gh issue list --state open --label log-monitor
               If an open PR or issue already covers this same error signature/root cause,
               STOP: add a one-line comment noting the new occurrence and exit. Do NOT open a
               duplicate.
            3. Trace the root cause in the checked-out source (Grep/Read the relevant files).
               Stay grounded in the actual code — do not speculate beyond what the logs and
               source support. If you cannot pin it down, open an issue (step 4, CONFIG path)
               describing what you found and what evidence is missing.
            4. Decide the fix type:
               - CODE fix (a bug in app/ or client/ source): make the MINIMAL change, then:
                   git checkout -b log-monitor/fix-<short-slug>
                   git commit -am "Fix: <concise description>"
                   git push -u origin HEAD
                   gh pr create --title "[log-monitor] Fix: <concise description>" \
                     --label log-monitor \
                     --body "<root-cause analysis, the deployed commit, the log excerpt, and why this fix addresses it. Note that merging to main auto-deploys via CD.>"
                 Do NOT push to main directly. Keep the diff small and focused on this error.
               - CONFIG/INFRA fix (env var, docker-compose, nginx, Cloudflare, a server
                 command — nothing in source can fix it): do NOT change code. Instead:
                   gh issue create --title "[log-monitor] <concise description>" \
                     --label log-monitor \
                     --body "<root cause, the EXACT command(s) or config change the operator must run, the deployed commit, and the log excerpt.>"
            5. Be concise and high-signal. The operator only wants to review and approve.

            If the `log-monitor` label does not exist yet, create it first:
              gh label create log-monitor --color B60205 --description "AI log-monitor" || true
