# AI log-monitor — ALERTER. Woken by the VPS detector (scripts/log-monitor.sh) via a
# `repository_dispatch` event of type `prod-error`. Deterministically opens (or, on a repeat,
# comments on) a GitHub issue carrying the bundled prod-error context, so you get a push
# notification (GitHub mobile / email) the moment a new error appears — no LLM in the path,
# so it can't be rate-limited, can't "simulate", and costs nothing per run.
#
# Triage is yours: a code bug → open a fix PR; a config/infra problem → run the command on the
# VPS. (An optional AI-diagnosis comment can be layered on later — see PR notes — but the alert
# itself never depends on it.)
name: AI Log Monitor

on:
  repository_dispatch:
    types: [prod-error]

# One alert at a time; never cancel an in-flight issue write.
concurrency:
  group: log-monitor
  cancel-in-progress: false

jobs:
  alert:
    runs-on: ubuntu-latest
    permissions:
      issues: write            # the ONLY permission needed: open/comment the alert issue
    steps:
      - name: Open or update the log-monitor issue
        env:
          # GITHUB_TOKEN is auto-issued per run; exposed as GH_TOKEN so the gh CLI reads it.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # No checkout in this job, so gh can't infer the repo from a local .git — name it.
          GH_REPO: ${{ github.repository }}
          # Whole payload as JSON — parsed with jq so nothing is interpolated into the script.
          PAYLOAD: ${{ toJSON(github.event.client_payload) }}
        run: |
          set -euo pipefail

          commit=$(jq -r '.commit            // "unknown"' <<<"$PAYLOAD")
          service=$(jq -r '.primary_service   // "app"'     <<<"$PAYLOAD")
          host=$(jq -r '.host                 // "n/a"'     <<<"$PAYLOAD")
          detected=$(jq -r '.detected_at      // "n/a"'     <<<"$PAYLOAD")
          count=$(jq -r '.new_signature_count // "n/a"'     <<<"$PAYLOAD")
          excerpt=$(jq -r '.log_excerpt       // ""'        <<<"$PAYLOAD")
          sig=$(jq -r '(.signatures[0])       // empty'     <<<"$PAYLOAD")

          # Stable idempotency key: the first error signature from the detector, or — for
          # payloads without one (e.g. the synthetic test) — a short hash of the excerpt.
          if [ -z "$sig" ]; then
            sig=$(printf '%s' "$excerpt" | sha256sum | cut -c1-12)
          fi
          title="[log-monitor] ${service}: ${sig}"

          body=$(cat <<EOF
          **Production error detected** by the VPS log-monitor on https://every1luvs.com.

          | Field | Value |
          |---|---|
          | Service | \`${service}\` |
          | Deployed commit | \`${commit}\` |
          | Host | \`${host}\` |
          | Detected at | ${detected} |
          | New signatures this dispatch | ${count} |
          | Signature key | \`${sig}\` |

          <details><summary>Log excerpt</summary>

          \`\`\`
          ${excerpt}
          \`\`\`
          </details>

          ---
          _Filed automatically by \`.github/workflows/log-monitor.yml\`._
          **Triage:** if this is a code bug, open a fix PR against \`main\` (merging auto-deploys via CD);
          if it's config/infra, run the needed command on the VPS, then close this issue.
          EOF
          )

          # Idempotent: ensure the label exists, then comment on the matching open issue if one
          # exists, else open a fresh one. (The detector also dedupes upstream for 6h, so this is
          # belt-and-suspenders against state resets / concurrent dispatches.)
          gh label create log-monitor --color B60205 --description "AI log-monitor" 2>/dev/null || true

          existing=$(gh issue list --state open --label log-monitor \
            --json number,title \
            --jq "map(select(.title == \"${title}\")) | .[0].number // empty")

          if [ -n "$existing" ]; then
            gh issue comment "$existing" \
              --body "🔁 Recurred — detected at ${detected} on commit \`${commit}\` (${count} new signature(s) this dispatch)."
            echo "Commented on existing issue #${existing}."
          else
            url=$(gh issue create --title "$title" --label log-monitor --body "$body")
            echo "Opened issue: $url"
          fi
