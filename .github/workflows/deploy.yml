# Continuous deployment: build the app + web images, push to GHCR, then SSH to the VPS
# and roll the stack onto the new images. Runs only after the CI workflow succeeds on main,
# so tests gate every deploy. Manual re-deploy is available via the "Run workflow" button.
name: Deploy

on:
  workflow_run:
    workflows: ["CI"]          # the name: of ci.yml
    types: [completed]
    branches: [main]
  workflow_dispatch: {}        # allow a manual deploy from the Actions tab

concurrency:
  group: deploy-prod           # never run two deploys at once
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  APP_IMAGE: ghcr.io/qwertyblob/e1l-app
  WEB_IMAGE: ghcr.io/qwertyblob/e1l-web

jobs:
  build-and-push:
    # workflow_run fires even on CI failure; gate on success. (Always run for manual dispatch.)
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write          # push to GHCR with the built-in GITHUB_TOKEN
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push app image
        uses: docker/build-push-action@v6
        with:
          context: .                       # repo root (Maven build needs client/src/services.json)
          file: every1luvs/Dockerfile
          push: true
          tags: |
            ${{ env.APP_IMAGE }}:latest
            ${{ env.APP_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: web/Dockerfile
          push: true
          tags: |
            ${{ env.WEB_IMAGE }}:latest
            ${{ env.WEB_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Roll the stack over SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT }}      # leave the secret unset to default to 22
          script_stop: true                     # abort on the first failing command
          script: |
            set -euo pipefail
            cd ~/E1L
            # Authenticate to GHCR so the (private) images can be pulled.
            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u "${{ secrets.GHCR_USER }}" --password-stdin
            # Pull compose changes (image tags, healthchecks) but keep the local .env.
            git pull --ff-only
            # Pin this deploy to the exact commit's images, then roll the two app services.
            export E1L_IMAGE_TAG="${{ github.sha }}"
            docker compose pull app web
            docker compose up -d
            docker image prune -f
            docker compose ps
