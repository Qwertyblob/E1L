server {
    listen 80;
    server_name _;

    # --- Real client IP (see plan "X-Forwarded-For trust chain") ---
    # Traffic reaches nginx FROM the cloudflared container on the `edge` network, so nginx's
    # peer is a Docker IP (172.20.0.x), NOT a Cloudflare public IP. set_real_ip_from MUST be
    # the edge subnet; trusting Cloudflare's public ranges here would make nginx ignore
    # CF-Connecting-IP and collapse every visitor to the container IP (one shared rate-limit bucket).
    set_real_ip_from 172.20.0.0/24;
    real_ip_header CF-Connecting-IP;
    real_ip_recursive on;

    # Booking inspo images ride in the JSON body as base64 (~33% larger than the raw bytes).
    # Backend caps images at 5 MB each / 15 MB total; 24M leaves headroom for the encoding.
    client_max_body_size 24M;

    # --- Security headers (apply to every response; no location-level add_header below,
    # which would silently drop these inherited ones) ---
    # TLS terminates at Cloudflare, but HSTS must still be emitted by the origin to reach
    # the browser. Raise to includeSubDomains+preload only once all subdomains are HTTPS.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    # script-src 'self' (no unsafe-inline) requires the CRA build to NOT inline the runtime
    # chunk — web/Dockerfile sets INLINE_RUNTIME_CHUNK=false. style-src keeps 'unsafe-inline'
    # for React style={} attributes. The XSRF-TOKEN cookie is JS-readable by design, so CSP
    # is the main backstop against XSS-driven CSRF.
    # fonts.googleapis.com (stylesheet) + fonts.gstatic.com (font files) allow the Google Fonts
    # <link> in index.html. TODO: self-host the fonts (Vite migration) and drop these two exceptions.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data:; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self'; object-src 'none'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Docker embedded DNS, so the `app` upstream is re-resolved after container restarts
    # (avoids the resolve-once-at-boot stale-IP 502).
    resolver 127.0.0.11 valid=10s ipv6=off;

    root /usr/share/nginx/html;
    index index.html;

    location /api/ {
        # Variable upstream + resolver => per-request DNS resolution. Because the variable form
        # drops the location-derived URI, the full original path is re-appended via $request_uri
        # (backend controllers are mapped under /api, so the path is preserved verbatim).
        set $upstream_app app;
        proxy_pass http://$upstream_app:8080$request_uri;

        proxy_set_header Host $host;
        # Overwrite XFF with the single, realip-resolved client IP. Deliberately NOT
        # $proxy_add_x_forwarded_for (which would keep a client-spoofed prefix and defeat the
        # backend's split(",")[0] rate-limit key).
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto https;
    }

    # SPA fallback: serve index.html for client-side routes.
    location / {
        try_files $uri /index.html;
    }
}
