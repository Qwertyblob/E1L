server {
    listen 80;
    server_name _;

    # --- Real client IP (see plan "X-Forwarded-For trust chain") ---
    # Traffic reaches nginx FROM the cloudflared container on the `edge` network, so nginx's
    # peer is a Docker IP (172.20.0.x), NOT a Cloudflare public IP. set_real_ip_from MUST be
    # the edge subnet; trusting Cloudflare's public ranges here would make nginx ignore
    # CF-Connecting-IP and collapse every visitor to the container IP (one shared rate-limit bucket).
    set_real_ip_from 172.20.0.0/24;
    real_ip_header CF-Connecting-IP;
    real_ip_recursive on;

    # Default cap for any request; the booking routes raise it (base64 inspo images) and the
    # auth routes lower it (tiny JSON) in their per-location blocks below. A modest 1M default
    # keeps every other endpoint from having to accept a 24M body just because bookings do.
    client_max_body_size 1M;

    # --- Security headers (apply to every response; no location-level add_header below,
    # which would silently drop these inherited ones) ---
    # TLS terminates at Cloudflare, but HSTS must still be emitted by the origin to reach
    # the browser. Raise to includeSubDomains+preload only once all subdomains are HTTPS.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    # script-src 'self' (no unsafe-inline) requires the Vite build to emit no inline
    # <script> — vite.config.js sets build.modulePreload.polyfill=false. style-src keeps
    # 'unsafe-inline' for React style={} attributes. The XSRF-TOKEN cookie is JS-readable
    # by design, so CSP is the main backstop against XSS-driven CSRF.
    # Fonts are self-hosted (@fontsource, bundled to /assets), so no fonts.googleapis.com /
    # fonts.gstatic.com exceptions are needed — font-src 'self' covers the local woff2/woff.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self'; object-src 'none'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Docker embedded DNS, so the `app` upstream is re-resolved after container restarts
    # (avoids the resolve-once-at-boot stale-IP 502).
    resolver 127.0.0.11 valid=10s ipv6=off;

    root /usr/share/nginx/html;
    index index.html;

    # Booking creation carries base64 inspo images in the JSON body (~33% larger than the raw
    # bytes). Backend caps images at 5 MB each / 15 MB total; 24M leaves headroom for encoding.
    # Exact-match (=) so only the two attachment-bearing endpoints get the large limit; every
    # other /api/bookings/* path (cancel, list) falls through to the 1M general block below.
    location = /api/bookings {
        client_max_body_size 24M;
        include /etc/nginx/api_proxy.conf;
    }
    location = /api/bookings/me {
        client_max_body_size 24M;
        include /etc/nginx/api_proxy.conf;
    }

    # Auth payloads are small JSON (email + password/OTP); a tight 16k cap blunts body-based
    # abuse of the pre-auth, CSRF-exempt endpoints. AuthService also length-validates the fields.
    location /api/auth/ {
        client_max_body_size 16k;
        include /etc/nginx/api_proxy.conf;
    }

    # Everything else under /api inherits the server-level 1M default.
    location /api/ {
        include /etc/nginx/api_proxy.conf;
    }

    # SPA fallback: serve index.html for client-side routes.
    location / {
        try_files $uri /index.html;
    }
}
