# Shared /api upstream proxy directives, included by every /api* location so the per-route
# client_max_body_size limits below can differ while this proxy/XFF logic stays defined once.
# (Kept out of conf.d/ — files there are auto-loaded at http scope; this must be included
# inside a location, so it lives at /etc/nginx/api_proxy.conf and is included by absolute path.)

# Variable upstream + resolver => per-request DNS resolution. Because the variable form
# drops the location-derived URI, the full original path is re-appended via $request_uri
# (backend controllers are mapped under /api, so the path is preserved verbatim).
set $upstream_app app;
proxy_pass http://$upstream_app:8080$request_uri;

proxy_set_header Host $host;
# Overwrite XFF with the single, realip-resolved client IP. Deliberately NOT
# $proxy_add_x_forwarded_for (which would keep a client-spoofed prefix and defeat the
# backend's split(",")[0] rate-limit key).
proxy_set_header X-Forwarded-For $remote_addr;
proxy_set_header X-Real-IP $remote_addr;
proxy_set_header X-Forwarded-Proto https;
