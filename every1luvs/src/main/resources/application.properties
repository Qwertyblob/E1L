spring.datasource.url=${DATABASE_URL:jdbc:postgresql://127.0.0.1:5432/every1luvs}
spring.datasource.username=${DB_USERNAME:jarvis}
spring.datasource.password=${DB_PASSWORD:}

# Flyway owns the schema (src/main/resources/db/migration/V*.sql); the old replayed
# schema.sql is retired. baseline-on-migrate marks a pre-Flyway database that already
# has the schema as version 1 instead of re-running V1 into it; empty databases get V1.
spring.flyway.baseline-on-migrate=true
spring.sql.init.mode=never

# CRITICAL FOR PRODUCTION: Hibernate must never alter the schema — Flyway migrations are
# the only write path. 'validate' fails fast on any entity/schema mismatch in every
# environment (integration tests override to create-drop on H2 with Flyway disabled).
spring.jpa.hibernate.ddl-auto=${DB_DDL_MODE:validate}
spring.jpa.open-in-view=false

# Empty default forces an explicit value; TokenService enforces a 32-char minimum at startup.
app.auth.token-secret=${AUTH_TOKEN_SECRET:}
app.auth.token-expiration-ms=${AUTH_TOKEN_EXPIRATION_MS:86400000}
# Auth JWT is delivered as an httpOnly cookie (not localStorage) so XSS can't read it.
# Secure must be OFF for local http dev (browsers drop Secure cookies on http://localhost)
# and MUST be set true in production. SameSite=Lax suits same-site (localhost) dev; use
# Strict, or None+Secure for a cross-site prod frontend, as appropriate.
app.auth.cookie.name=${AUTH_COOKIE_NAME:auth_token}
app.auth.cookie.secure=${AUTH_COOKIE_SECURE:false}
app.auth.cookie.same-site=${AUTH_COOKIE_SAME_SITE:Lax}
app.auth.otp.expiration-ms=${VERIFY_OTP_EXPIRATION_MS:600000}
# Keep false in all environments; only flip to true temporarily during local debugging.
app.auth.otp.log-to-console=${VERIFY_OTP_LOG_TO_CONSOLE:false}
# Disabled by default; enable only during initial deployment with explicit env vars.
app.auth.bootstrap-admin-enabled=${BOOTSTRAP_ADMIN_ENABLED:false}
app.auth.bootstrap-admin-name=${BOOTSTRAP_ADMIN_NAME:Admin}
app.auth.bootstrap-admin-email=${BOOTSTRAP_ADMIN_EMAIL:}
# No default password — AdminBootstrapConfig rejects a blank value at startup.
app.auth.bootstrap-admin-password=${BOOTSTRAP_ADMIN_PASSWORD:}
app.mail.from=${APP_MAIL_FROM:no-reply@every1luvs.test}
# Inbox that receives the full booking notification. Dedicated so it survives the removal of the
# one-time bootstrap-admin credentials; blank falls back to app.mail.from (see BookingMailService).
app.mail.admin-to=${ADMIN_NOTIFICATION_EMAIL:}
# Destination for the post-appointment review request. Defaults to the Instagram page; override
# REVIEW_URL with a dedicated review page (e.g. a Google Business "write a review" link) when
# available. Blank = feature dormant (no review emails sent, no booking stamped).
app.review.url=${REVIEW_URL:https://instagram.com/every1luvsnails}
# Destination for the ~3-weeks-after rebooking prompt (the studio's booking page). Defaults to the
# site's services section where booking happens; override with BOOKING_URL. Blank = feature dormant.
app.rebooking.url=${BOOKING_URL:https://every1luvs.com/#services}
# Trust the X-Forwarded-For header for client-IP rate limiting. Keep false unless the API
# sits behind a trusted reverse proxy that overwrites/strips inbound XFF; otherwise a client
# can spoof the header to bypass the per-IP guest-booking limit.
app.proxy.trust-forwarded-for=${TRUST_FORWARDED_FOR:false}
# Comma-separated CORS allowed origins. Defaults to the local dev frontend; set
# CORS_ALLOWED_ORIGINS to the prod frontend origin(s) when the API is served cross-origin.
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://127.0.0.1:3000,http://localhost:3001,http://127.0.0.1:3001}

# Liveness/readiness for the docker-compose healthcheck (and ops curl). Only `health` is
# exposed — no info/env/metrics endpoints leak configuration. The app port is never
# published to the host, so this stays reachable only from inside the compose networks.
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
# Exclude mail from the aggregate health status. Otherwise a transient SMTP outage makes
# /actuator/health report DOWN, the compose healthcheck marks the app container unhealthy,
# and a redeploy aborts even though the web app itself is serving fine. Mail delivery is
# best-effort (sent async; failures logged with the ASYNC_TASK_FAILURE marker), so it must
# not gate liveness.
management.health.mail.enabled=false

spring.mail.host=${MAIL_HOST:sandbox.smtp.mailtrap.io}
spring.mail.port=${MAIL_PORT:2525}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
