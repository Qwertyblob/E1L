# every1luvs production stack — Cloudflare Tunnel ingress, segmented networks, no published ports.
# Deploy:  docker compose up -d --build      (after creating .env from .env.example)

# Cap container logs (default json-file driver grows unbounded and eventually fills the
# disk on a small host). 10 MB x 5 files = 50 MB ceiling per service.
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

services:
  db:
    image: postgres:17
    restart: unless-stopped
    logging: *default-logging
    environment:
      POSTGRES_DB: every1luvs
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - data           # reachable only by `app`, never by web/cloudflared
    healthcheck:
      # `app` waits for this to pass, so Spring Boot never boots into a connection-refused crash.
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d every1luvs"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    # CI builds & pushes this image to GHCR; the server `docker compose pull`s it (see
    # .github/workflows/deploy.yml). `build` stays so local `up -d --build` still works and
    # tags the result under the same name. ${E1L_IMAGE_TAG:-latest} lets a deploy pin a SHA.
    image: ghcr.io/qwertyblob/e1l-app:${E1L_IMAGE_TAG:-latest}
    build:
      context: .                       # repo root: Maven build needs ../client/src/services.json
      dockerfile: every1luvs/Dockerfile
    restart: unless-stopped
    logging: *default-logging
    # Least privilege: enumerate ONLY the variables Spring reads, rather than injecting the whole
    # .env (which also holds the Cloudflare tunnel token, the log-monitor PAT, and R2 backup creds
    # this process never needs). Compose still reads .env for the ${...} interpolation below.
    #   ${VAR:?...}  → required; compose fails fast if unset.
    #   ${VAR:-def}  → optional; falls back to the app default when unset OR blank, so a blank line
    #                  in .env can never silently override a real default (e.g. REVIEW_URL).
    # Bootstrap-admin vars are intentionally NOT injected here — run a one-time override for first
    # boot (see the bootstrap note in .env.example) so they aren't permanently present.
    environment:
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      DB_USERNAME: ${DB_USERNAME:?DB_USERNAME is required}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      DB_DDL_MODE: ${DB_DDL_MODE:-validate}
      AUTH_TOKEN_SECRET: ${AUTH_TOKEN_SECRET:?AUTH_TOKEN_SECRET is required}
      AUTH_TOKEN_EXPIRATION_MS: ${AUTH_TOKEN_EXPIRATION_MS:-86400000}
      AUTH_COOKIE_SECURE: ${AUTH_COOKIE_SECURE:-true}
      AUTH_COOKIE_SAME_SITE: ${AUTH_COOKIE_SAME_SITE:-Lax}
      TRUST_FORWARDED_FOR: ${TRUST_FORWARDED_FOR:-true}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-https://every1luvs.com}
      APP_MAIL_FROM: ${APP_MAIL_FROM:?APP_MAIL_FROM is required}
      MAIL_HOST: ${MAIL_HOST:?MAIL_HOST is required}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:?MAIL_USERNAME is required}
      MAIL_PASSWORD: ${MAIL_PASSWORD:?MAIL_PASSWORD is required}
      # Blank → the app falls back to APP_MAIL_FROM (see BookingMailService).
      ADMIN_NOTIFICATION_EMAIL: ${ADMIN_NOTIFICATION_EMAIL:-}
      REVIEW_URL: ${REVIEW_URL:-https://instagram.com/every1luvsnails}
      BOOKING_URL: ${BOOKING_URL:-https://every1luvs.com/#services}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - appnet                         # reached by web (for /api)
      - data                           # reaches db
    expose:
      - "8080"                         # internal only; no host port published
    healthcheck:
      # Catches a hung (not crashed) JVM, which `restart: unless-stopped` alone never
      # would. Actuator exposes only /actuator/health (see application.properties).
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s                # JVM + schema init headroom on first boot

  web:
    image: ghcr.io/qwertyblob/e1l-web:${E1L_IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: web/Dockerfile
    restart: unless-stopped
    logging: *default-logging
    depends_on:
      app:
        condition: service_healthy     # don't serve the SPA until /api can answer
    networks:
      edge:
        ipv4_address: 172.20.0.10      # static edge IP; the tunnel targets http://172.20.0.10:80
      appnet: {}                       # to reach the app upstream
    expose:
      - "80"

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    logging: *default-logging
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${TUNNEL_TOKEN}
    depends_on:
      - web
    networks:
      - edge                           # only the edge network; cannot reach app or db

networks:
  edge:
    ipam:
      config:
        - subnet: 172.20.0.0/24
  appnet:
    ipam:
      config:
        - subnet: 172.21.0.0/24
  data:
    ipam:
      config:
        - subnet: 172.22.0.0/24

volumes:
  db_data:
