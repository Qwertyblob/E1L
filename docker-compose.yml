# every1luvs production stack — Cloudflare Tunnel ingress, segmented networks, no published ports.
# Deploy:  docker compose up -d --build      (after creating .env from .env.example)

# Cap container logs (default json-file driver grows unbounded and eventually fills the
# disk on a small host). 10 MB x 5 files = 50 MB ceiling per service.
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

services:
  db:
    image: postgres:17
    restart: unless-stopped
    logging: *default-logging
    environment:
      POSTGRES_DB: every1luvs
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - data           # reachable only by `app`, never by web/cloudflared
    healthcheck:
      # `app` waits for this to pass, so Spring Boot never boots into a connection-refused crash.
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d every1luvs"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    # CI builds & pushes this image to GHCR; the server `docker compose pull`s it (see
    # .github/workflows/deploy.yml). `build` stays so local `up -d --build` still works and
    # tags the result under the same name. ${E1L_IMAGE_TAG:-latest} lets a deploy pin a SHA.
    image: ghcr.io/qwertyblob/e1l-app:${E1L_IMAGE_TAG:-latest}
    build:
      context: .                       # repo root: Maven build needs ../client/src/services.json
      dockerfile: every1luvs/Dockerfile
    restart: unless-stopped
    logging: *default-logging
    env_file: .env                     # DATABASE_URL=jdbc:postgresql://db:5432/every1luvs, AUTH_*, MAIL_*, etc.
    depends_on:
      db:
        condition: service_healthy
    networks:
      - appnet                         # reached by web (for /api)
      - data                           # reaches db
    expose:
      - "8080"                         # internal only; no host port published
    healthcheck:
      # Catches a hung (not crashed) JVM, which `restart: unless-stopped` alone never
      # would. Actuator exposes only /actuator/health (see application.properties).
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s                # JVM + schema init headroom on first boot

  web:
    image: ghcr.io/qwertyblob/e1l-web:${E1L_IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: web/Dockerfile
    restart: unless-stopped
    logging: *default-logging
    depends_on:
      app:
        condition: service_healthy     # don't serve the SPA until /api can answer
    networks:
      edge:
        ipv4_address: 172.20.0.10      # static edge IP; the tunnel targets http://172.20.0.10:80
      appnet: {}                       # to reach the app upstream
    expose:
      - "80"

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    logging: *default-logging
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${TUNNEL_TOKEN}
    depends_on:
      - web
    networks:
      - edge                           # only the edge network; cannot reach app or db

networks:
  edge:
    ipam:
      config:
        - subnet: 172.20.0.0/24
  appnet:
    ipam:
      config:
        - subnet: 172.21.0.0/24
  data:
    ipam:
      config:
        - subnet: 172.22.0.0/24

volumes:
  db_data:
